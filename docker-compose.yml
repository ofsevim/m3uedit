version: '3.8'

services:
  m3uedit:
    build: .
    container_name: m3u-editor-pro
    ports:
      - "8501:8501"
    volumes:
      - ./visitor_data.json:/app/visitor_data.json
      - ./history.json:/app/history.json
    environment:
      - APP_ENV=production
      - DEBUG_MODE=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
