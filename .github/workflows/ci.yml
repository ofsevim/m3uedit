name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8 (optional)
      continue-on-error: true
      run: |
        pip install flake8
        flake8 src utils --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests (optional)
      continue-on-error: true
      run: |
        pip install pytest
        pytest tests/ -v || echo "Tests not found or failed, continuing..."
    
    - name: Syntax check
      run: |
        python -m py_compile app.py
        python -m py_compile src/app.py
        python -m py_compile utils/config.py
        python -m py_compile utils/visitor_counter.py
