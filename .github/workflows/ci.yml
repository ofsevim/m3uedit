name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8 (optional)
      continue-on-error: true
      run: |
        pip install flake8
        flake8 src utils --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests (optional)
      continue-on-error: true
      run: |
        pip install pytest
        pytest tests/ -v || echo "Tests not found or failed, continuing..."
    
    - name: Syntax check
      run: |
        python -m py_compile src/app.py
        python -m py_compile utils/config.py
        python -m py_compile utils/visitor_counter.py

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t m3uedit:latest .
    
    - name: Test Docker image
      run: |
        docker run -d -p 8501:8501 --name test-container m3uedit:latest
        sleep 15
        docker logs test-container
        docker stop test-container || true
        docker rm test-container || true

